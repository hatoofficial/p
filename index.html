<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>島田の自己紹介</title>
  <style>
    body {
      font-family: "Hiragino Kaku Gothic ProN", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #8B0000, #000000);
      color: #fff;
    }
    header {
      background-color: #b30000;
      text-align: center;
      padding: 30px;
      border-bottom: 5px solid gold;
    }
    header h1 {
      margin: 0;
      font-size: 2.5em;
      letter-spacing: 3px;
    }
    main {
      padding: 20px;
      max-width: 800px;
      margin: 30px auto;
      background: rgba(0,0,0,0.8);
      border: 3px solid gold;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    h2 {
      border-bottom: 2px solid gold;
      padding-bottom: 5px;
      color: gold;
    }
    .section {
      margin-bottom: 25px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    ul li::before {
      content: "🍜 ";
    }
